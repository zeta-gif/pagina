<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Herramientas Literarias</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@500;700&display=swap');

    body {
     
      background: linear-gradient(180deg, 
        #ff9a9e 0%, 
        #fecfef 25%, 
        #feebb4 55%, 
        #a1c4fd 85%, 
        #c2e9fb 100%
      );
      font-family: 'Quicksand', sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 160px 20px; /* Margen para las colinas inferiores */
      box-sizing: border-box;
      position: relative;
      overflow-x: hidden;
    }

    
    body::before {
      content: "";
      position: fixed;
      bottom: 0;
      left: -10%;
      width: 120%;
      height: 200px;
      background: #81c784;
      border-radius: 100% 100% 0 0;
      z-index: 0;
      box-shadow: inset 0 30px 0 #66bb6a, 0 -10px 30px rgba(0,0,0,0.05);
    }

    .colina-extra {
      position: fixed;
      bottom: -50px;
      right: -20%;
      width: 100%;
      height: 250px;
      background: #4caf50;
      border-radius: 100% 100% 0 0;
      z-index: 0;
      opacity: 0.8;
    }

    
    h2 { 
      font-family: 'Fredoka', sans-serif;
      font-size: clamp(2rem, 6vw, 3.2rem); 
      margin-bottom: 40px; 
      color: #fff; 
      text-align: center;
      z-index: 2;
      text-shadow: 
        -3px -3px 0 #283593,  3px -3px 0 #283593,
        -3px  4px 0 #283593,  3px  4px 0 #283593,
        0px 6px 0px #ffeb3b,
        0px 12px 20px rgba(0,0,0,0.25);
      animation: flotarTitulo 4s ease-in-out infinite;
    }

    @keyframes flotarTitulo {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-10px) rotate(1deg); }
    }

    .container { 
      max-width: 650px; 
      width: 100%; 
      z-index: 2;
    }

  
    .tool-row {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 35px;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 15px 25px;
      box-sizing: border-box;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

  
    .tool-row:nth-child(1) { border: 6px solid #4caf50; box-shadow: 0 10px 0 #2e7d32, 0 15px 20px rgba(0,0,0,0.1); }
    .tool-row:nth-child(2) { border: 6px solid #00b0ff; box-shadow: 0 10px 0 #0d47a1, 0 15px 20px rgba(0,0,0,0.1); }
    .tool-row:nth-child(3) { border: 6px solid #ff9100; box-shadow: 0 10px 0 #b32d00, 0 15px 20px rgba(0,0,0,0.1); }
    .tool-row:nth-child(4) { border: 6px solid #e040fb; box-shadow: 0 10px 0 #9c27b0, 0 15px 20px rgba(0,0,0,0.1); }
    .tool-row:nth-child(5) { border: 6px solid #ff4081; box-shadow: 0 10px 0 #c2185b, 0 15px 20px rgba(0,0,0,0.1); }

  
    .tool-row:hover {
      transform: translateY(-8px) scale(1.02);
    }
    .tool-row:nth-child(1):hover { box-shadow: 0 16px 0 #2e7d32, 0 20px 25px rgba(0,0,0,0.15); }
    .tool-row:nth-child(2):hover { box-shadow: 0 16px 0 #0d47a1, 0 20px 25px rgba(0,0,0,0.15); }
    .tool-row:nth-child(3):hover { box-shadow: 0 16px 0 #b32d00, 0 20px 25px rgba(0,0,0,0.15); }
    .tool-row:nth-child(4):hover { box-shadow: 0 16px 0 #9c27b0, 0 20px 25px rgba(0,0,0,0.15); }
    .tool-row:nth-child(5):hover { box-shadow: 0 16px 0 #c2185b, 0 20px 25px rgba(0,0,0,0.15); }


    .icon-box { 
      font-size: 2.2rem; 
      background: #f5f6fa; 
      padding: 12px; 
      border-radius: 25px;
      border: 3px solid #dcdde1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 50px;
      height: 50px;
    }

    .info h3 { 
      margin: 0; 
      color: #2c3e50; 
      font-family: 'Fredoka', sans-serif; 
      font-size: 1.5rem;
    }

   
    .btn-link {
      margin-left: auto;
      padding: 12px 30px;
      color: white;
      text-decoration: none;
      border-radius: 25px;
      font-family: 'Fredoka', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      text-transform: uppercase;
      border: 2px solid #fff;
      transition: all 0.1s ease;
    }


    .tool-row:nth-child(1) .btn-link { background: #ff9100; box-shadow: 0 5px 0 #b32d00; }
    .tool-row:nth-child(2) .btn-link { background: #ff4081; box-shadow: 0 5px 0 #c2185b; }
    .tool-row:nth-child(3) .btn-link { background: #00e5ff; box-shadow: 0 5px 0 #00838f; color: #004d40; }
    .tool-row:nth-child(4) .btn-link { background: #4caf50; box-shadow: 0 5px 0 #1b5e20; }
    .tool-row:nth-child(5) .btn-link { background: #ffeb3b; box-shadow: 0 5px 0 #f57f17; color: #3e2723; }

    .btn-link:hover { filter: brightness(1.1); }
    
    .btn-link:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 rgba(0,0,0,0.2) !important;
    }

    .back-nav { 
      margin-top: 30px; 
      color: white; 
      font-family: 'Fredoka', sans-serif;
      font-weight: 700; 
      text-decoration: none; 
      font-size: 1.2rem;
      text-transform: uppercase;
      background: linear-gradient(180deg, #ffb300, #ff6f00);
      padding: 14px 35px;
      border-radius: 30px;
      border: 3px solid #fff;
      box-shadow: 0 8px 0 #e65100, 0 10px 20px rgba(0,0,0,0.2);
      transition: all 0.1s ease;
      z-index: 2;
    }

    .back-nav:hover { filter: brightness(1.1); }
    .back-nav:active { transform: translateY(6px); box-shadow: 0 2px 0 rgba(0,0,0,0.2) !important; }


    .elemento-jardin {
      position: absolute;
      z-index: 1;
      font-size: 2.5rem;
      user-select: none;
      pointer-events: none;
      animation: caerYGirar 11s linear infinite;
    }

    @keyframes caerYGirar {
      0% { transform: translateY(-50px) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
    }

    @media (max-width: 550px) {
      body { padding-bottom: 120px; }
      .tool-row { flex-direction: column; text-align: center; padding: 25px 20px; }
      .btn-link { margin-left: 0; width: 100%; box-sizing: border-box; }
      body::before { height: 120px; }
      .colina-extra { height: 140px; }
    }
  </style>
</head>
